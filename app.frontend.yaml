runtime: nodejs20
env: standard
service: frontend

handlers:
  - url: /.*
    secure: always
    redirect_http_response_code: 301
    static_files: build/index.html
    upload: build/index.html

  - url: /static
    secure: always
    redirect_http_response_code: 301
    static_dir: build/static

  - url: /.*
    secure: always
    redirect_http_response_code: 301
    script: auto
